<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Non-AC Rooms</title>
  <link rel="stylesheet" href="../css/rstyle.css">
</head>
<body>
  <header>
    <h1>Non-AC Rooms</h1>
  </header>

  <section>
    <table>
      <thead>
        <tr>
          <th>Room Number</th>
          <th>Type</th>
          <th>Available</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="roomTableBody">
        <!-- JS will add rows here -->
      </tbody>
    </table>
  </section>

  <script>
    // Fetch Non-AC rooms
    fetch('../rooms?type=Non-AC')
      .then(response => response.json())
      .then(data => {
        const tableBody = document.getElementById('roomTableBody');
        data.forEach(room => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${room.roomNumber}</td>
            <td>${room.roomType}</td>
            <td class="${room.isAvailable ? 'available' : 'unavailable'}">
              ${room.isAvailable ? 'Yes' : 'No'}
            </td>
            <td>₹${room.price}</td>
            <td>
              ${room.isAvailable 
                ? `<a href="confirm-booking.html?roomId=${room.id}">Book</a>` 
                : `<p>Booked by: ${room.bookedBy}</p>`}
            </td>
          `;
          tableBody.appendChild(row);
        });
      })
      .catch(error => console.error('Error loading Non-AC rooms:', error));
  </script>
</body>
</html>
