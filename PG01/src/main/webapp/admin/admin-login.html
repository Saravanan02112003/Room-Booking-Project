
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4a3aff,#6a5cff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-container{
background:white;
padding:40px;
width:320px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

label{
display:block;
text-align:left;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#4a3aff;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#3728d9;
}

</style>

</head>

<body>

<div class="form-container">

<h2>Admin Login</h2>

<form action="../adminLogin" method="post">

<label>Username:</label>
<input type="text" name="username" required>

<label>Password:</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
